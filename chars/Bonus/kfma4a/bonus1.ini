;===
; Gem Hints <!>
; Ģ¾É╬é╠āqāōāgĢ\Ä”
; sv01
; ABCDEFG
; AB:  Index Now
; CD:  Index Next
; EFG: Counter

; Shift Index
[state 0]
	type=varset
	triggerall=var((sysvar(1)/1000)%100)/100000000=2
	trigger1=var((sysvar(1)/100000)%100)/100000000!=2
	trigger2=sysvar(1)%1000>=360 ;;or 120
	trigger2=1||var((sysvar(1)/100000)%100):=0 ;;<-Erase Current Gem !!!
	sysvar(1)=((sysvar(1)/1000)%100)*100000+((sysvar(1)/1000)%100+1)*1000
; Searching for next Gem
[state 0]
	type=varadd
	trigger1=var((sysvar(1)/1000)%100)/100000000!=2
	sysvar(1)=1000
; Counter
[state 0]
	type=varadd
	trigger1=var((sysvar(1)/100000)%100)/100000000=2
	sysvar(1)=ifelse(sysvar(1)%1000<998,1,-998)
; Index Range
[state 0]
	type=varset
	trigger1=(sysvar(1)/1000)%100!=[1,38]
	sysvar(1)=sysvar(1)/100000*100000+1000+sysvar(1)%1000
;---
; Remove Tips (Gems & Target)
[state 0]
	type=removeexplod
	trigger1=1
	id=40
;---
[state 0]
	type=explod
;op;	trigger1=roundstate=2
	trigger1=var((sysvar(1)/100000)%100)/100000000=2
;op;	trigger1=(floor(fvar((sysvar(1)/100000)%100))/100)%100=50 ;; on the floor
	trigger1=sysvar(1)%1000>0
	id=40
	anim=17200+((sysvar(1)%1000)/9)%2+(floor(fvar((sysvar(1)/100000)%100)/10000)%10)*10
	sprpriority=-3
	postype=p1
	pos=(var((sysvar(1)/100000)%100)/10000)%10000-5000,var((sysvar(1)/100000)%100)%10000-9028 -floor(fvar((sysvar(1)/100000)%100))/100000*4
	facing=facing
	scale=abs(cos((sysvar(1)%1000+30)/60.00*3.14))*0.5/(parent,fvar(0)),0.5/(parent,fvar(0))
	removetime=1
	ownpal=0


;===============
; Facing, Position  v51
; ī³é½,Ź└ĢW
;===============
; Automatically turn when players had clustered on one side of screen.
; ēµ¢╩Æ[Ģ╬Ź▌Ä×Ä®ō«ĢŽŹX

; on left side
; ēµ¢╩ŹČŖ±éĶ
[state 0]
	type=varset
	triggerall=numenemy
	triggerall=enemynear,facing=1
	trigger1=numhelper(10001)
	trigger1=helper(10001),screenpos x<enemynear,screenpos x
	trigger1=numhelper(10002)
	trigger1=helper(10002),screenpos x<enemynear,screenpos x
	trigger1=numhelper(10003)
	trigger1=helper(10003),screenpos x<enemynear,screenpos x
	sysfvar(0)=-parent,var(17)*teamside*10

; on right side
; ēµ¢╩ēEŖ±éĶ
[state 0]
	type=varset
	triggerall=numenemy
	triggerall=enemynear,facing=-1
	trigger1=numhelper(10001)
	trigger1=helper(10001),screenpos x>enemynear,screenpos x
	trigger1=numhelper(10002)
	trigger1=helper(10002),screenpos x>enemynear,screenpos x
	trigger1=numhelper(10003)
	trigger1=helper(10003),screenpos x>enemynear,screenpos x
	sysfvar(0)=parent,var(17)+teamside*10

; init height
