; 10000: [helper] : bonus helper
; 	call clone kfms
; 	process: gems, scores
; ------	-------
; v00   :	temp index
; v01-39:	gem(01-39)
; f00   :	temp
; f01-39:	...
; v40-49:	gem count
; v50   :	kfm count
; v51   :	distance + helper index/id
; v55-57:	temp
; v58   :	timer
; v59   :	kfms(helper) alive flag(###)
; ------	-------
; sv00-01:	gem index
; sf00-01:	parent pos x-y
; ------	-------

;--------------------
; Bonus Helper
;--------------------
[statedef 10000]
type=s
movetype=i
physics=s
anim=1;empty
sprpriority=-1
velset=0,0
ctrl=0

; change palette *mugen1.0*
[state 0]
	type=remappal
	trigger1=!time
	source=1,1
	dest=1,((palno+3)%6)+1

[state 0]
