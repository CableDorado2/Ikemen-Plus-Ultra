[state 0]
	type=varset
	trigger1=1
	var(51)=2000999
[state 0]
	type=varset
	triggerall=numhelper(10001) && numenemy
	triggerall=helper(10001),life>1
	triggerall=helper(10001),screenpos x=[0,parent,var(17)]
	triggerall=abs(helper(10001),screenpos x-enemynear,screenpos x)<var(51)/1000
	trigger1=enemynear,facing=1
	trigger1=helper(10001),screenpos x>enemynear,screenpos x
	trigger2=enemynear,facing=-1
	trigger2=helper(10001),screenpos x<enemynear,screenpos x
	var(51)=abs(floor(helper(10001),screenpos x-enemynear,screenpos x))*1000+1
[state 0]
