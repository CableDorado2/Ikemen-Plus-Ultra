; pos x
[state 0]
	type=varadd
	trigger1=var(30):=ifelse(teamside=1,3,316)+(3-teamside*2)*(var(40)%10)*30
	trigger1=var(31)-var(30)
	var(31)=(var(30)-var(31))/12+ifelse(var(31)>var(30),-1,1)
	ignorehitpause=1
[state 0]
	type=varadd
	trigger1=var(30):=ifelse(teamside=1,3,316)+(3-teamside*2)*((var(40)/10)%10)*30
	trigger1=var(32)-var(30)
	var(32)=(var(30)-var(32))/12+ifelse(var(32)>var(30),-1,1)
	ignorehitpause=1
[state 0]
	type=varadd
	trigger1=var(30):=ifelse(teamside=1,3,316)+(3-teamside*2)*((var(40)/100)%10)*30
	trigger1=var(33)-var(30)
	var(33)=(var(30)-var(33))/12+ifelse(var(33)>var(30),-1,1)
