;---gems screen bound range [10-310]
; left
[state 0]
	type=varset
	trigger1=1
	var(13)=10
; right
[state 0]
	type=varset
	trigger1=1
	var(14)=floor(310/fvar(0))
;---gems screen out range [-18-338]
; left
[state 0]
	type=varset
	trigger1=1
	var(15)=-18
; right
[state 0]
	type=varset
	trigger1=1
	var(16)=floor(338/fvar(0))
;---screen width (screen-in)
[state 0]
	type=varset
	trigger1=1
	var(17)=floor(320/fvar(0))

;---gems shake bound
[state 0]
	type=varset
	trigger1=var(5)
	var(5)=0
	ignorehitpause=1
[state 0]
	type=varset
	trigger1=numenemy
	trigger1=enemy,stateno=5100||enemy,stateno=5110
	trigger1=enemy,time<3
	trigger2=numenemy
	trigger2=enemy,sysvar(4)
	trigger2=enemy,numhelper(9004)||enemy,numhelper(9005)||enemy,numhelper(9006)
	trigger3=numhelper(10001)
	trigger3=helper(10001),stateno=5100||helper(10001),stateno=5110
	trigger3=helper(10001),time<3
	trigger4=numhelper(10002)
	trigger4=helper(10002),stateno=5100||helper(10002),stateno=5110
	trigger4=helper(10002),time<3
	trigger5=numhelper(10003)
	trigger5=helper(10003),stateno=5100||helper(10003),stateno=5110
	trigger5=helper(10003),time<3
	var(5)=1
	ignorehitpause=1

;--- disable all envshake
[state 0]
	type=envshake
	trigger1=1
	freq=0
	ampl=0
	phase=0
	time=10
	ignorehitpause=1
	supermovetime=888888
	pausemovetime=888888


;===============
; clone kfms alive flag (v40)
;===============

[state 0]
	type=varset
	trigger1=!time && !var(40)
	var(40)=12 ;;[012+n] ;;<-index init

;--- out
[state 0]
	type=varset
	trigger1=numhelper(10003)
	trigger1=helper(10003),var(18)=2 ;;<-alive flag
	var(40)=200 + ((var(40)/10)%10-((var(40)/10)%10>(var(40)/100)%10))*10 + (var(40)%10-(var(40)%10>(var(40)/100)%10))
[state 0]
	type=varset
	trigger1=numhelper(10002)
	trigger1=helper(10002),var(18)=2
	var(40)=20 + ((var(40)/100)%10-((var(40)/100)%10>(var(40)/10)%10))*100 + (var(40)%10-(var(40)%10>(var(40)/10)%10))
[state 0]
	type=varset
	trigger1=numhelper(10001)
	trigger1=helper(10001),var(18)=2
	var(40)=2 + ((var(40)/100)%10-((var(40)/100)%10>var(40)%10))*100 + ((var(40)/10)%10-((var(40)/10)%10>var(40)%10))*10


