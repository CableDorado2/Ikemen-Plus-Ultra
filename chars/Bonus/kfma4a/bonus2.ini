; 10005: [player] : bonus mode 1, display bars
; 20000: [helper] : no life bar
; 10002: [helper] : clone kfms init
; 10010: [helper] : result
; 6000:  [helper] : =clone kfms stand state
; 6021:  [helper] : =clone kfms walk state
; 6101:  [helper] : =clone kfms run state
; 105150:[helper] : remove helper
; ------	-------
; v00   :	temp
; v02-04:	used
; v05   :	gems shake
; v06   :	counter/teammode flag
; v07   :	temp/rect_x
; v08   :	temp/rect_y
; v09-10:	temp/rect_w
; v11-12:	temp/rect_h
; v13-14:	screen left-right
; v15-16:	screen out left-right
; v17   :	screen in width=320
; v18   :	gethit flag
; v20   :	enemynear_num/id
; v21   :	temp action time in stete6000 (helper)
; v22   :	temp freeze time in stete6000 (helper)
; ------	-------
; v30-39:	helpers index / pos x
; v40   :	kfms alive flag / index
; v42-49:	helpers life
; ------	-------
; f00   :	camerazoom (modify for mugen version)
; ------	-------

;--------------------
; player state
;--------------------
[statedef 10005]
type=s
movetype=i
physics=n
anim=1;empty
sprpriority=-2
velset=0,0
ctrl=0

;---
; modify f(0) for mugen version
[state 10005,camerazoom]
	type=varset
	trigger1=1

;;*mugen v1.0 (for non zoom stages)
	fvar(0)=1

;;*mugen v1.1 (compatible with zoom stages)
;;	fvar(0)=camerazoom


;---
[state 0]
	type=nothitby
	trigger1=1
	value=sca
	time=50
;---
; player mode
[state 0]
	type=varset
	triggerall=var(6)!=1
	trigger1=numpartner=0
	trigger2=numpartner
	trigger2=id<partner,id
	var(6)=1
[state 0]
	type=varset
	triggerall=var(6)
	trigger1=numpartner
	trigger1=id>partner,id
	var(6)=0
;---
;; remove life&power bars
;;[state 0]
;;	type=varset
;;	trigger1=1
;;	sysvar(3)=-1

;; no bar switch
[state 0]
	type=explod
	trigger1=1
	anim=0
	scale=0,0
	id=920861 ;; ## switch_id
	removetime=1
	ignorehitpause=1
;---
;; no screenbound switch
[state 0]
	type=explod
	trigger1=1
	anim=0
	scale=0,0
	id=920851 ;; ## switch_id
	removetime=1
	ignorehitpause=1
;---

; ***bonus stage flag
; remove ko & ranking helper
[state 0]
	type=explod
	trigger1=!numexplod(920000)
	anim=1
	id=920000
	removetime=-1

;---
; disable all attack kill switch
[state 0]
	type=varset
	trigger1=1 ; !var(4)
	var(4)=1 ;;<-disable

;--------
;--------
; bonus helper
[state 0]
	type=helper
	trigger1=!ishelper
	trigger1=!numhelper(10000) && var(6)
	id=10000
	stateno=10000
	type=normal
	postype=left
	pos=160,0
;--------
;--------
; no bars helper
[state 0]
	type=helper
	trigger1=!ishelper && (sysfvar(0)<=0)
	trigger1=!numhelper(20000) && var(6)
	id=20000
	stateno=20000
	type=normal
	ownpal=0
	keyctrol=0
	ignorehitpause=1
	supermovetime=888888
	pausemovetime=888888
;--------
;--------
[state 0]
	type=statetypeset
	trigger1=movetype!=i
	trigger1=var(18):=1
	movetype=i

[state 0]
	type=statetypeset
	triggerall=!var(18)
	triggerall=roundstate=2
	triggerall=movetype!=h
;v1;	trigger1=cond(numhelper(10001),helper(10001),movetype=h,0)
;v1;	trigger2=cond(numhelper(10002),helper(10002),movetype=h,0)
;v1;	trigger3=cond(numhelper(10003),helper(10003),movetype=h,0)
;--;	trigger4=cond(numhelper(10004),helper(10004),movetype=h,0)
;--;	trigger5=cond(numhelper(10005),helper(10005),movetype=h,0)
;--;	trigger6=cond(numhelper(10006),helper(10006),movetype=h,0)
	trigger1=numhelper(10001)
	trigger1=helper(10001),movetype=h
	trigger2=numhelper(10002)
	trigger2=helper(10002),movetype=h
	trigger3=numhelper(10003)
	trigger3=helper(10003),movetype=h
	movetype=h

[state 0]
	type=lifeadd
	trigger1=roundstate>2
	trigger1=life>1
	value=-lifemax
;op;	kill=0

; end
[state 0]
	type=lifeset
	triggerall=life>0
	trigger1=numhelper(10000)
	trigger1=helper(10000),time>0
	trigger1=helper(10000),var(58)<1
	trigger2=numpartner
	trigger2=partner,life<1
	value=0
[state 0]
	type=ctrlset
	trigger1=roundstate>2
	value=1
;---
[state 0]
	type=powerset ;; poweradd
	trigger1=1 ;; time%500=0
	value=0 ;;1000
;---
[state 0]
	type=screenbound
	trigger1=1
	value=0

;--- pos
[state 0]
	type=posset
	trigger1=numhelper(10000)
	x=helper(10000),sysfvar(0)
	y=helper(10000),sysfvar(1)
[state 0]
	type=posset
	trigger1=!numhelper(10000)
	trigger1=numpartner && !var(6)
	x=partner,pos x
	y=partner,pos y
;---
[state 0]
	type=turn
	triggerall=numenemy
	trigger1=facing=1
	trigger1=screenpos x>enemynear,screenpos x
	trigger2=facing=-1
	trigger2=screenpos x<enemynear,screenpos x
;---

;--- gems rect
; enemynear_num/id  ;;1:enemy(#) 2:enemynear(#) 3:playerid(#) 4:helper(#)
[state 0]
	type=varset
	trigger1=1
	var(20)=gametime%numenemy ;;[0/1]
	ignorehitpause=1
;---
; player_pos_x
[state 0]
	type=varset
	trigger1=numenemy
	var(7)=floor(enemynear(var(20)),screenpos x)
	ignorehitpause=1
; player_pos_y
[state 0]
	type=varset
	trigger1=numenemy
	var(8)=floor(enemynear(var(20)),screenpos y)
	ignorehitpause=1
;--- player rect
; rect_x1/left
[state 0]
	type=varset
	trigger1=numenemy
	var(9)=-10-ifelse(enemynear(var(20)),facing=1,enemynear(var(20)),const(size.ground.back),enemynear(var(20)),const(size.ground.front))
	ignorehitpause=1
; rect_x2/right
[state 0]
	type=varset
	trigger1=numenemy
	var(10)=10+ifelse(enemynear(var(20)),facing=1,enemynear(var(20)),const(size.ground.front),enemynear(var(20)),const(size.ground.back))
	ignorehitpause=1
; rect_y1/top
[state 0]
	type=varset
	trigger1=numenemy
	var(11)=enemynear(var(20)),const(size.head.pos.y)
	ignorehitpause=1
; rect_y2/bottom
[state 0]
	type=varset
	trigger1=1
	var(12)=18 ;; (must be >0)
	ignorehitpause=1

